<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | FusionAI</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*{
    font-family:'Inter',sans-serif;
    transition: all .3s ease;
}

/* === COPY YOUR ROOT VARIABLES === */
:root{
    --bg-primary:#ffffff;
    --bg-secondary:#f8fafc;
    --text-primary:#0f172a;
    --text-secondary:#475569;
    --border-color:#e2e8f0;
    --blue-primary:#6366f1;
    --blue-secondary:#4f46e5;
    --blue-light:#eef2ff;
    --purple-primary:#a855f7;
    --shadow-md:0 4px 12px rgba(0,0,0,.08);
    --shadow-floating:0 20px 60px rgba(99,102,241,.2);
}

.dark-mode{
    --bg-primary:#0f172a;
    --bg-secondary:#1e293b;
    --text-primary:#f1f5f9;
    --text-secondary:#cbd5e1;
    --border-color:#334155;
    --blue-light:rgba(99,102,241,.1);
}

body{
    background:var(--bg-primary);
    color:var(--text-primary);
}

/* Card */
.auth-card{
    background:var(--bg-primary);
    border:1px solid var(--border-color);
    box-shadow:var(--shadow-floating);
    border-radius:24px;
}

/* Input */
.input-field{
    background:var(--bg-secondary);
    border:2px solid var(--border-color);
    border-radius:14px;
    padding:14px;
    width:100%;
    font-weight:500;
}
.input-field:focus{
    outline:none;
    border-color:var(--blue-primary);
    box-shadow:0 0 0 4px var(--blue-light);
}

/* Button */
.btn-primary{
    background:linear-gradient(135deg,var(--blue-primary),var(--blue-secondary));
    color:white;
    font-weight:600;
    border-radius:14px;
    padding:14px;
    box-shadow:var(--shadow-md);
}
.btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(99,102,241,.4);
}

/* Gradient Text */
.gradient-text{
    background:linear-gradient(135deg,var(--blue-primary),var(--purple-primary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen px-6">

<div class="auth-card p-10 w-full max-w-md">

    <!-- Logo -->
    <div class="flex items-center gap-3 mb-8 justify-center">
        <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center shadow-lg">
            <i class="fas fa-rocket text-white text-xl"></i>
        </div>
        <h1 class="text-2xl font-bold gradient-text">FusionAI</h1>
    </div>

    <h2 class="text-3xl font-bold mb-2 text-center">Welcome Back</h2>
    <p class="text-center mb-8" style="color:var(--text-secondary)">
        Sign in to continue to your AI workspace
    </p>

    <form class="space-y-5" onsubmit="event.preventDefault(); loginUser()">
        <input type="text" id="username" placeholder="Username" class="input-field">
        <input type="password" id="password" placeholder="Password" class="input-field">
        <button type="button" onclick="loginUser()"
            class="btn-primary w-full">
            Sign In
        </button>

        <p id="errorMsg" class="text-red-500 mt-3 text-center"></p>
    </form>

    <p class="text-center mt-6 text-sm" style="color:var(--text-secondary)">
        Don’t have an account?
        <a href="/sign_up" class="font-semibold" style="color:var(--blue-primary)">Sign Up</a>
    </p>

</div>

<script>
    function loginUser() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        
        if (!username || !password) {
            document.getElementById("errorMsg").innerText = "Please enter both username and password";
            return;
        }
        
        fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: username,
                password: password
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                window.location.href = "/";
            } else {
                document.getElementById("errorMsg").innerText = data.message;
            }
        })
        .catch(error => {
            document.getElementById("errorMsg").innerText = "Error connecting to server";
            console.error('Error:', error);
        });
    }
</script>

</body>
</html>
